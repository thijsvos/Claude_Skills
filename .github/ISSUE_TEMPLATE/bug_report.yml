name: Bug Report
description: Report a broken or misbehaving skill
labels: ["bug"]
body:
  - type: input
    id: skill
    attributes:
      label: Skill name
      description: Which skill is affected?
      placeholder: e.g., enhance
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Run `/<skill-name>`
        2. ...
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      description: Which Claude model were you using?
      placeholder: e.g., claude-opus-4-7
    validations:
      required: false
